<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platform Tag Rooms</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: '#0b1220',
            panel: '#111a2d',
            accent: '#38bdf8',
            lime: '#84cc16',
            warn: '#fb7185'
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div class="min-h-screen bg-[radial-gradient(circle_at_20%_20%,rgba(56,189,248,0.18),transparent_35%),radial-gradient(circle_at_80%_0%,rgba(132,204,22,0.12),transparent_30%),linear-gradient(to_bottom,#05070f,#0b1220)] p-4 md:p-8">
    <div class="mx-auto max-w-7xl">
      <header class="mb-6 rounded-2xl border border-slate-700/60 bg-panel/80 p-4 backdrop-blur">
        <h1 class="text-2xl font-bold tracking-tight">Platform Tag Rooms</h1>
        <p class="text-sm text-slate-300">Multiplayer platformer tag with rooms, big scrolling maps, and center-follow camera.</p>
        <div class="mt-3 flex flex-wrap gap-2 text-xs text-slate-300">
          <span class="rounded-md border border-slate-600 px-2 py-1">A / D Move</span>
          <span class="rounded-md border border-slate-600 px-2 py-1">W or Space Jump</span>
          <span class="rounded-md border border-slate-600 px-2 py-1">Touch = Tag Transfer</span>
        </div>
      </header>

      <section id="lobbySection" class="mx-auto max-w-xl rounded-2xl border border-slate-700/60 bg-panel/80 p-5 backdrop-blur">
        <div class="space-y-4">
          <div>
            <label class="mb-1 block text-xs uppercase tracking-wide text-slate-400">Player Name</label>
            <input id="nameInput" maxlength="16" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-sm outline-none focus:border-accent" placeholder="Player" />
          </div>

          <div>
            <label class="mb-1 block text-xs uppercase tracking-wide text-slate-400">Map</label>
            <select id="mapSelect" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-sm outline-none focus:border-accent">
              <option value="city">Neon City</option>
              <option value="ruins">Sky Ruins</option>
            </select>
          </div>

          <button id="createRoomBtn" class="w-full rounded-lg bg-accent px-3 py-2 text-sm font-semibold text-ink transition hover:brightness-110">Create Room</button>

          <div class="rounded-lg border border-slate-700 p-3">
            <label class="mb-1 block text-xs uppercase tracking-wide text-slate-400">Join Room Code</label>
            <div class="flex gap-2">
              <input id="roomCodeInput" maxlength="8" class="w-full rounded-lg border border-slate-600 bg-slate-900 px-3 py-2 text-sm uppercase outline-none focus:border-accent" placeholder="AB12CD" />
              <button id="joinRoomBtn" class="rounded-lg bg-lime px-3 py-2 text-sm font-semibold text-ink transition hover:brightness-110">Join</button>
            </div>
          </div>

          <p id="statusText" class="text-sm text-slate-300">Sign in loading...</p>
        </div>
      </section>

      <section id="gameSection" class="hidden">
        <div class="mb-4 flex flex-wrap items-center justify-center gap-3 text-sm">
          <div class="rounded-lg border border-slate-700 bg-panel/80 px-3 py-2">Room: <span id="roomCodeText" class="font-mono font-semibold"></span></div>
          <div class="rounded-lg border border-slate-700 bg-panel/80 px-3 py-2">Map: <span id="mapNameText" class="font-semibold"></span></div>
          <div class="rounded-lg border border-slate-700 bg-panel/80 px-3 py-2">You: <span id="youText" class="font-semibold"></span></div>
          <div class="rounded-lg border border-slate-700 bg-panel/80 px-3 py-2">Tagger: <span id="taggerText" class="font-semibold"></span></div>
          <button id="leaveRoomBtn" class="rounded-lg bg-warn px-3 py-2 text-sm font-semibold text-ink transition hover:brightness-110">Leave Room</button>
        </div>

        <div class="mx-auto flex w-full max-w-[1100px] justify-center">
          <div class="relative w-full overflow-hidden rounded-2xl border border-slate-700/60 bg-slate-900/80 shadow-2xl">
            <canvas id="gameCanvas" width="1280" height="720" class="mx-auto block h-auto w-full max-w-[1100px]"></canvas>
            <div id="overlay" class="pointer-events-none absolute inset-0 hidden items-center justify-center bg-slate-950/40">
              <div class="rounded-xl border border-slate-600 bg-panel/90 px-6 py-4 text-center">
                <p id="overlayText" class="text-lg font-semibold"></p>
              </div>
            </div>
          </div>
        </div>

        <div class="mx-auto mt-4 w-full max-w-[1100px] rounded-2xl border border-slate-700/60 bg-panel/80 p-3 backdrop-blur">
          <p class="mb-2 text-xs uppercase tracking-wide text-slate-400">Leaderboard (Most Tags)</p>
          <div id="leaderboard" class="grid gap-2 sm:grid-cols-2 lg:grid-cols-3"></div>
        </div>
      </section>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
